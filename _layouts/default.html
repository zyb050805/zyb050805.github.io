<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>
    {% if page.title %}
      {{ page.title }} - {{ site.title }}
    {% else %}
      {{ site.title }}
    {% endif %}
  </title>
  
  <!-- SEO 优化 -->
  {% seo %}
  
  <!-- 自定义样式 -->
  <link rel="stylesheet" href="{{ '/assets/css/custom.css' | relative_url }}">
</head>
<body>
  <header class="site-header">
    <nav class="main-nav">
      <a href="{{ '/' | relative_url }}" class="logo">{{ site.title }}</a>
      <ul class="nav-links">
        <li><a href="{{ '/' | relative_url }}">首页</a></li>
        <li><a href="{{ '/about/' | relative_url }}">关于</a></li>
        <li><a href="{{ '/courses/' | relative_url }}">课程</a></li>
      </ul>
    </nav>
  </header>

  <main class="page-content">
    {{ content }}  <!-- 子模板内容注入点 -->
  </main>

  <footer class="site-footer">
    <p>© {{ site.time | date: "%Y" }} {{ site.title }} | 
       使用 Jekyll & GitHub Pages 构建</p>
  </footer>
</body>
</html>
